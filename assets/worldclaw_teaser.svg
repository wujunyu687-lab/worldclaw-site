<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 760" role="img" aria-label="WorldClaw overview diagram">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbfcff"/>
      <stop offset="100%" stop-color="#eef3ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1d2f6f" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#6f7fa7"/>
    </marker>
  </defs>

  <rect width="1400" height="760" rx="24" fill="url(#bg)"/>

  <text x="700" y="72" text-anchor="middle" font-size="36" font-weight="700" fill="#16203b" font-family="Arial, Helvetica, sans-serif">
    WorldClaw System Overview
  </text>
  <text x="700" y="108" text-anchor="middle" font-size="18" fill="#5a6786" font-family="Arial, Helvetica, sans-serif">
    Multi-platform access routed into specialized internal bots with shared runtime and memory
  </text>

  <text x="210" y="172" text-anchor="middle" font-size="22" font-weight="700" fill="#1f2e4f" font-family="Arial, Helvetica, sans-serif">
    Access Layer
  </text>
  <text x="700" y="172" text-anchor="middle" font-size="22" font-weight="700" fill="#1f2e4f" font-family="Arial, Helvetica, sans-serif">
    Orchestration Layer
  </text>
  <text x="1185" y="172" text-anchor="middle" font-size="22" font-weight="700" fill="#1f2e4f" font-family="Arial, Helvetica, sans-serif">
    Execution Layer
  </text>

  <g filter="url(#shadow)">
    <rect x="70" y="210" width="280" height="100" rx="20" fill="#ffffff" stroke="#cfd8ef" stroke-width="2"/>
    <text x="210" y="250" text-anchor="middle" font-size="26" font-weight="700" fill="#1f2e4f" font-family="Arial, Helvetica, sans-serif">Terminal</text>
    <text x="210" y="282" text-anchor="middle" font-size="17" fill="#667596" font-family="Arial, Helvetica, sans-serif">bin/worldclaw local entry</text>

    <rect x="70" y="340" width="280" height="100" rx="20" fill="#ffffff" stroke="#cfd8ef" stroke-width="2"/>
    <text x="210" y="380" text-anchor="middle" font-size="26" font-weight="700" fill="#1f2e4f" font-family="Arial, Helvetica, sans-serif">WeChat</text>
    <text x="210" y="412" text-anchor="middle" font-size="17" fill="#667596" font-family="Arial, Helvetica, sans-serif">metabot / metabot-2</text>

    <rect x="70" y="470" width="280" height="100" rx="20" fill="#ffffff" stroke="#cfd8ef" stroke-width="2"/>
    <text x="210" y="510" text-anchor="middle" font-size="26" font-weight="700" fill="#1f2e4f" font-family="Arial, Helvetica, sans-serif">Feishu</text>
    <text x="210" y="542" text-anchor="middle" font-size="17" fill="#667596" font-family="Arial, Helvetica, sans-serif">worldclaw-feishu</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="540" y="315" width="320" height="160" rx="28" fill="#3273dc" />
    <text x="700" y="382" text-anchor="middle" font-size="32" font-weight="700" fill="#ffffff" font-family="Arial, Helvetica, sans-serif">
      orchestrator-bot
    </text>
    <text x="700" y="420" text-anchor="middle" font-size="18" fill="#dce8ff" font-family="Arial, Helvetica, sans-serif">
      planning · routing · aggregation
    </text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1030" y="200" width="310" height="88" rx="18" fill="#ffffff" stroke="#cfd8ef" stroke-width="2"/>
    <text x="1185" y="236" text-anchor="middle" font-size="24" font-weight="700" fill="#1f2e4f" font-family="Arial, Helvetica, sans-serif">train-bot</text>
    <text x="1185" y="264" text-anchor="middle" font-size="16" fill="#667596" font-family="Arial, Helvetica, sans-serif">target · variant · experiment · ledger</text>

    <rect x="1030" y="308" width="310" height="88" rx="18" fill="#ffffff" stroke="#cfd8ef" stroke-width="2"/>
    <text x="1185" y="344" text-anchor="middle" font-size="24" font-weight="700" fill="#1f2e4f" font-family="Arial, Helvetica, sans-serif">eval-bot</text>
    <text x="1185" y="372" text-anchor="middle" font-size="16" fill="#667596" font-family="Arial, Helvetica, sans-serif">benchmark entry · precheck · compare</text>

    <rect x="1030" y="416" width="310" height="88" rx="18" fill="#ffffff" stroke="#cfd8ef" stroke-width="2"/>
    <text x="1185" y="452" text-anchor="middle" font-size="24" font-weight="700" fill="#1f2e4f" font-family="Arial, Helvetica, sans-serif">papersearch-bot</text>
    <text x="1185" y="480" text-anchor="middle" font-size="16" fill="#667596" font-family="Arial, Helvetica, sans-serif">topic search · proceedings crawl</text>

    <rect x="1030" y="524" width="310" height="88" rx="18" fill="#ffffff" stroke="#cfd8ef" stroke-width="2"/>
    <text x="1185" y="560" text-anchor="middle" font-size="24" font-weight="700" fill="#1f2e4f" font-family="Arial, Helvetica, sans-serif">report-bot</text>
    <text x="1185" y="588" text-anchor="middle" font-size="16" fill="#667596" font-family="Arial, Helvetica, sans-serif">summary · archive · project memory</text>
  </g>

  <line x1="350" y1="260" x2="540" y2="360" stroke="#7f90b9" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="350" y1="390" x2="540" y2="395" stroke="#7f90b9" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="350" y1="520" x2="540" y2="430" stroke="#7f90b9" stroke-width="5" marker-end="url(#arrow)"/>

  <line x1="860" y1="360" x2="1030" y2="244" stroke="#7f90b9" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="860" y1="392" x2="1030" y2="352" stroke="#7f90b9" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="860" y1="424" x2="1030" y2="460" stroke="#7f90b9" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="860" y1="456" x2="1030" y2="568" stroke="#7f90b9" stroke-width="5" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="450" y="618" width="500" height="86" rx="18" fill="#ffffff" stroke="#cfd8ef" stroke-width="2"/>
    <text x="700" y="652" text-anchor="middle" font-size="24" font-weight="700" fill="#1f2e4f" font-family="Arial, Helvetica, sans-serif">Shared Runtime and Memory</text>
    <text x="700" y="681" text-anchor="middle" font-size="16" fill="#667596" font-family="Arial, Helvetica, sans-serif">runtime/ · outputs · logs · .metamemory/</text>
  </g>
</svg>
